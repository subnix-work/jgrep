name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jvm:
    name: JVM tests — ${{ matrix.module }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module: [jgrep, ygrep]
    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: pom.xml

      - name: Verify
        run: ./mvnw -B -ntp verify

      - name: Upload JVM package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.module }}-jvm-quarkus-app
          path: ${{ matrix.module }}/target/quarkus-app/**
          if-no-files-found: error
