name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: JVM build & test
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Build and test all modules
        run: ./jgrep/mvnw -B -ntp verify

      - name: Upload jgrep JVM package
        uses: actions/upload-artifact@v6
        with:
          name: jgrep-jvm-quarkus-app
          path: jgrep/target/quarkus-app/**
          if-no-files-found: error

      - name: Upload ygrep JVM package
        uses: actions/upload-artifact@v6
        with:
          name: ygrep-jvm-quarkus-app
          path: ygrep/target/quarkus-app/**
          if-no-files-found: error
