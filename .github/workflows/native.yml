name: Native Builds

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-native:
    name: Linux native — ${{ matrix.module }} (x64)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module: [jgrep, ygrep]
    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          native-image-job-reports: true

      - name: Build native executable
        run: ./mvnw -B -ntp package -Dnative -DskipTests

      - name: Read version
        id: version
        run: echo "version=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Smoke test — jgrep
        if: matrix.module == 'jgrep'
        run: |
          ./target/jgrep-${{ steps.version.outputs.version }}-runner --version
          printf '%s\n' '{"name":"Alice"}' | ./target/jgrep-${{ steps.version.outputs.version }}-runner '.name'
          ./target/jgrep-${{ steps.version.outputs.version }}-runner completion bash | grep -- '--from-file'

      - name: Smoke test — ygrep
        if: matrix.module == 'ygrep'
        run: |
          ./target/ygrep-${{ steps.version.outputs.version }}-runner --version
          printf 'service:\n  name: checkout\n' | ./target/ygrep-${{ steps.version.outputs.version }}-runner '.service.name'
          ./target/ygrep-${{ steps.version.outputs.version }}-runner completion bash | grep -- '--from-file'

      - name: Prepare Linux release asset
        run: |
          mkdir -p target/dist
          cp target/${{ matrix.module }}-${{ steps.version.outputs.version }}-runner target/dist/${{ matrix.module }}
          chmod +x target/dist/${{ matrix.module }}

      - name: Upload Linux native executable
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.module }}-linux-x64
          path: ${{ matrix.module }}/target/dist/${{ matrix.module }}
          if-no-files-found: error

  macos-native:
    name: macOS native — ${{ matrix.module }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            module: jgrep
            artifact: jgrep-macos-arm64
          - runner: macos-15-intel
            arch: x64
            module: jgrep
            artifact: jgrep-macos-x64
          - runner: macos-15
            arch: arm64
            module: ygrep
            artifact: ygrep-macos-arm64
          - runner: macos-15-intel
            arch: x64
            module: ygrep
            artifact: ygrep-macos-x64
    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          native-image-job-reports: true

      - name: Build native executable
        run: ./mvnw -B -ntp package -Dnative -DskipTests

      - name: Read version
        id: version
        run: echo "version=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Smoke test — jgrep
        if: matrix.module == 'jgrep'
        run: |
          ./target/jgrep-${{ steps.version.outputs.version }}-runner --version
          printf '%s\n' '{"name":"Alice"}' | ./target/jgrep-${{ steps.version.outputs.version }}-runner '.name'

      - name: Smoke test — ygrep
        if: matrix.module == 'ygrep'
        run: |
          ./target/ygrep-${{ steps.version.outputs.version }}-runner --version
          printf 'service:\n  name: checkout\n' | ./target/ygrep-${{ steps.version.outputs.version }}-runner '.service.name'

      - name: Package native executable
        run: |
          mkdir -p target/dist
          cp target/${{ matrix.module }}-${{ steps.version.outputs.version }}-runner target/dist/${{ matrix.module }}
          chmod +x target/dist/${{ matrix.module }}
          tar -czf target/dist/${{ matrix.artifact }}.tar.gz -C target/dist ${{ matrix.module }}

      - name: Upload native executable
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.module }}/target/dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release assets
    needs:
      - linux-native
      - macos-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-linux-x64"
          path: release-assets/binaries
          merge-multiple: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "*-macos-*"
          path: release-assets/archives
          merge-multiple: true

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ls -lR release-assets
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/binaries/* release-assets/archives/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/binaries/* release-assets/archives/* \
              --title "$TAG_NAME" --generate-notes --verify-tag
          fi
