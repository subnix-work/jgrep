name: Native Builds

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-native:
    name: Linux native — ${{ matrix.module }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        module: [jgrep, ygrep]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: "**/pom.xml"

      - name: Install shared module
        run: ./jgrep/mvnw -B -ntp install -pl shared -DskipTests

      - name: Build native (Docker container)
        working-directory: ${{ matrix.module }}
        run: ./mvnw -B -ntp package -Pnative -Dquarkus.native.container-build=true -DskipTests

      - name: Smoke test
        run: |
          runner=$(ls ${{ matrix.module }}/target/${{ matrix.module }}-*-runner | head -1)
          "$runner" --version
          if [ "${{ matrix.module }}" = "jgrep" ]; then
            printf '%s\n' '{"name":"Alice"}' | "$runner" '.name'
            "$runner" completion bash | grep -- '--from-file'
          else
            printf 'service:\n  name: checkout\n' | "$runner" '.service.name'
            "$runner" completion bash | grep -- '--from-file'
          fi

      - name: Prepare release asset
        run: |
          runner=$(ls ${{ matrix.module }}/target/${{ matrix.module }}-*-runner | head -1)
          mkdir -p ${{ matrix.module }}/target/dist
          cp "$runner" ${{ matrix.module }}/target/dist/${{ matrix.module }}
          chmod +x ${{ matrix.module }}/target/dist/${{ matrix.module }}

      - name: Upload Linux native executable
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.module }}-linux-x64
          path: ${{ matrix.module }}/target/dist/${{ matrix.module }}
          if-no-files-found: error

  macos-native:
    name: macOS native — ${{ matrix.module }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            module: jgrep
            artifact: jgrep-macos-arm64
          - runner: macos-15-intel
            arch: x64
            module: jgrep
            artifact: jgrep-macos-x64
          - runner: macos-15
            arch: arm64
            module: ygrep
            artifact: ygrep-macos-arm64
          - runner: macos-15-intel
            arch: x64
            module: ygrep
            artifact: ygrep-macos-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "25"
          native-image-job-reports: true

      - name: Install shared module
        run: ./jgrep/mvnw -B -ntp install -pl shared -DskipTests

      - name: Build native (GraalVM)
        working-directory: ${{ matrix.module }}
        run: ./mvnw -B -ntp package -Dnative -DskipTests

      - name: Smoke test
        run: |
          runner=$(ls ${{ matrix.module }}/target/${{ matrix.module }}-*-runner | head -1)
          "$runner" --version
          if [ "${{ matrix.module }}" = "jgrep" ]; then
            printf '%s\n' '{"name":"Alice"}' | "$runner" '.name'
          else
            printf 'service:\n  name: checkout\n' | "$runner" '.service.name'
          fi

      - name: Package native executable
        run: |
          runner=$(ls ${{ matrix.module }}/target/${{ matrix.module }}-*-runner | head -1)
          mkdir -p ${{ matrix.module }}/target/dist
          cp "$runner" ${{ matrix.module }}/target/dist/${{ matrix.module }}
          chmod +x ${{ matrix.module }}/target/dist/${{ matrix.module }}
          tar -czf ${{ matrix.module }}/target/dist/${{ matrix.artifact }}.tar.gz \
            -C ${{ matrix.module }}/target/dist ${{ matrix.module }}

      - name: Upload native executable
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.module }}/target/dist/${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: [linux-native, macos-native]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download Linux binaries
        uses: actions/download-artifact@v8
        with:
          pattern: "*-linux-x64"
          path: release-assets/binaries
          merge-multiple: true

      - name: Download macOS archives
        uses: actions/download-artifact@v8
        with:
          pattern: "*-macos-*"
          path: release-assets/archives
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ls -lR release-assets
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/binaries/* release-assets/archives/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/binaries/* release-assets/archives/* \
              --title "$TAG_NAME" --generate-notes --verify-tag
          fi
